<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <pattern id="sc-xhatch" width="8" height="8" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="8" y2="8" stroke="#7114E2" stroke-width="0.5" opacity="0.6"/>
      <line x1="8" y1="0" x2="0" y2="8" stroke="#7114E2" stroke-width="0.5" opacity="0.6"/>
    </pattern>
    <pattern id="sc-dots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="0.7" fill="#7114E2" opacity="0.55"/>
    </pattern>
    <pattern id="sc-diag" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="6" x2="6" y2="0" stroke="#7114E2" stroke-width="0.4" opacity="0.5"/>
    </pattern>
  </defs>
  <!-- Construction lines -->
  <line x1="200" y1="20" x2="200" y2="380" stroke="#D4D4D4" stroke-width="0.4" stroke-dasharray="2,4"/>
  <line x1="40" y1="200" x2="360" y2="200" stroke="#D4D4D4" stroke-width="0.4" stroke-dasharray="2,4"/>
  <line x1="200" y1="130" x2="80" y2="60" stroke="#D4D4D4" stroke-width="0.3" stroke-dasharray="1,3"/>
  <line x1="200" y1="130" x2="320" y2="60" stroke="#D4D4D4" stroke-width="0.3" stroke-dasharray="1,3"/>
  <line x1="200" y1="130" x2="120" y2="380" stroke="#D4D4D4" stroke-width="0.3" stroke-dasharray="1,3"/>
  <line x1="200" y1="130" x2="280" y2="380" stroke="#D4D4D4" stroke-width="0.3" stroke-dasharray="1,3"/>
  <!-- Corner marks -->
  <g stroke="#D4D4D4" stroke-width="0.5" opacity="0.4">
    <line x1="20" y1="20" x2="35" y2="20"/><line x1="20" y1="20" x2="20" y2="35"/>
    <line x1="380" y1="20" x2="365" y2="20"/><line x1="380" y1="20" x2="380" y2="35"/>
    <line x1="20" y1="380" x2="35" y2="380"/><line x1="20" y1="380" x2="20" y2="365"/>
    <line x1="380" y1="380" x2="365" y2="380"/><line x1="380" y1="380" x2="380" y2="365"/>
  </g>
  <!-- Central hub -->
  <polygon points="200,95 232,112 232,146 200,163 168,146 168,112" fill="#7114E2" fill-opacity="0.28" stroke="#7114E2" stroke-width="1.2" opacity="0.9"/>
  <polygon points="200,95 232,112 232,146 200,163 168,146 168,112" fill="url(#sc-dots)"/>
  <circle cx="200" cy="129" r="4" fill="#7114E2" opacity="0.7"/>
  <circle cx="200" cy="129" r="8" fill="none" stroke="#7114E2" stroke-width="0.6" opacity="0.55"/>
  <!-- Distribution lines -->
  <line x1="183" y1="150" x2="115" y2="200" stroke="#7114E2" stroke-width="1" opacity="0.65"/>
  <line x1="217" y1="150" x2="285" y2="200" stroke="#7114E2" stroke-width="1" opacity="0.65"/>
  <line x1="200" y1="163" x2="200" y2="220" stroke="#7114E2" stroke-width="1" opacity="0.65"/>
  <!-- Sub-branches -->
  <line x1="115" y1="200" x2="70" y2="250" stroke="#7114E2" stroke-width="0.8" opacity="0.55"/>
  <line x1="115" y1="200" x2="140" y2="268" stroke="#7114E2" stroke-width="0.8" opacity="0.55"/>
  <line x1="285" y1="200" x2="330" y2="250" stroke="#7114E2" stroke-width="0.8" opacity="0.55"/>
  <line x1="285" y1="200" x2="260" y2="268" stroke="#7114E2" stroke-width="0.8" opacity="0.55"/>
  <line x1="200" y1="220" x2="200" y2="290" stroke="#7114E2" stroke-width="0.8" opacity="0.55"/>
  <!-- Branch nodes -->
  <circle cx="115" cy="200" r="3" fill="#7114E2" opacity="0.65"/>
  <circle cx="285" cy="200" r="3" fill="#7114E2" opacity="0.65"/>
  <circle cx="200" cy="220" r="3" fill="#7114E2" opacity="0.65"/>
  <!-- Block A (left-top) -->
  <polygon points="70,230 100,216 130,230 100,244" fill="#7114E2" fill-opacity="0.2" stroke="#7114E2" stroke-width="1" opacity="0.8"/>
  <polygon points="70,230 100,244 100,268 70,254" fill="url(#sc-xhatch)" stroke="#7114E2" stroke-width="0.8" opacity="0.7"/>
  <polygon points="70,230 100,244 100,268 70,254" fill="#7114E2" fill-opacity="0.38"/>
  <polygon points="130,230 100,244 100,268 130,254" fill="#7114E2" fill-opacity="0.15" stroke="#7114E2" stroke-width="0.8" opacity="0.7"/>
  <!-- Block B (left-bottom) -->
  <polygon points="115,260 145,246 175,260 145,274" fill="#7114E2" fill-opacity="0.25" stroke="#7114E2" stroke-width="1" opacity="0.8"/>
  <polygon points="115,260 145,274 145,300 115,286" fill="url(#sc-dots)" stroke="#7114E2" stroke-width="0.8" opacity="0.7"/>
  <polygon points="115,260 145,274 145,300 115,286" fill="#7114E2" fill-opacity="0.42"/>
  <polygon points="175,260 145,274 145,300 175,286" fill="#7114E2" fill-opacity="0.2" stroke="#7114E2" stroke-width="0.8" opacity="0.7"/>
  <!-- Block C (center) -->
  <polygon points="175,275 210,258 245,275 210,292" fill="#7114E2" fill-opacity="0.25" stroke="#7114E2" stroke-width="1.2" opacity="0.8"/>
  <polygon points="175,275 210,292 210,338 175,321" fill="url(#sc-xhatch)" stroke="#7114E2" stroke-width="1" opacity="0.75"/>
  <polygon points="175,275 210,292 210,338 175,321" fill="#7114E2" fill-opacity="0.4"/>
  <polygon points="245,275 210,292 210,338 245,321" fill="url(#sc-dots)" stroke="#7114E2" stroke-width="1" opacity="0.75"/>
  <polygon points="245,275 210,292 210,338 245,321" fill="#7114E2" fill-opacity="0.15"/>
  <!-- Block D (right-bottom) -->
  <polygon points="235,258 265,244 295,258 265,272" fill="#7114E2" fill-opacity="0.2" stroke="#7114E2" stroke-width="1" opacity="0.8"/>
  <polygon points="235,258 265,272 265,296 235,282" fill="url(#sc-diag)" stroke="#7114E2" stroke-width="0.8" opacity="0.7"/>
  <polygon points="235,258 265,272 265,296 235,282" fill="#7114E2" fill-opacity="0.4"/>
  <polygon points="295,258 265,272 265,296 295,282" fill="#7114E2" fill-opacity="0.15" stroke="#7114E2" stroke-width="0.8" opacity="0.7"/>
  <!-- Block E (right-top) -->
  <polygon points="300,230 330,216 360,230 330,244" fill="#7114E2" fill-opacity="0.25" stroke="#7114E2" stroke-width="1" opacity="0.8"/>
  <polygon points="300,230 330,244 330,262 300,248" fill="url(#sc-xhatch)" stroke="#7114E2" stroke-width="0.8" opacity="0.7"/>
  <polygon points="300,230 330,244 330,262 300,248" fill="#7114E2" fill-opacity="0.35"/>
  <polygon points="360,230 330,244 330,262 360,248" fill="#7114E2" fill-opacity="0.12" stroke="#7114E2" stroke-width="0.8" opacity="0.7"/>
  <!-- Flow arrows -->
  <polygon points="148,175 153,170 153,180" fill="#7114E2" opacity="0.6" transform="rotate(-25,150,175)"/>
  <polygon points="248,175 253,170 253,180" fill="#7114E2" opacity="0.6" transform="rotate(25,250,175)"/>
  <polygon points="197,190 203,190 200,197" fill="#7114E2" opacity="0.6"/>
  <!-- Percentage labels -->
  <text x="100" y="280" font-family="monospace" font-size="7" fill="#7114E2" opacity="0.6" text-anchor="middle">24%</text>
  <text x="210" y="350" font-family="monospace" font-size="7" fill="#7114E2" opacity="0.6" text-anchor="middle">38%</text>
  <text x="265" y="308" font-family="monospace" font-size="7" fill="#7114E2" opacity="0.6" text-anchor="middle">22%</text>
  <text x="330" y="272" font-family="monospace" font-size="7" fill="#7114E2" opacity="0.6" text-anchor="middle">16%</text>
</svg>
