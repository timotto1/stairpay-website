<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <pattern id="a-xhatch" width="8" height="8" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="8" y2="8" stroke="#7114E2" stroke-width="0.5" opacity="0.6"/>
      <line x1="8" y1="0" x2="0" y2="8" stroke="#7114E2" stroke-width="0.5" opacity="0.6"/>
    </pattern>
    <pattern id="a-dots" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="0.7" fill="#7114E2" opacity="0.55"/>
    </pattern>
    <pattern id="a-diag" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="6" x2="6" y2="0" stroke="#7114E2" stroke-width="0.4" opacity="0.5"/>
    </pattern>
  </defs>
  <!-- Construction lines -->
  <line x1="60" y1="340" x2="340" y2="60" stroke="#D4D4D4" stroke-width="0.4" stroke-dasharray="2,4"/>
  <line x1="200" y1="20" x2="200" y2="380" stroke="#D4D4D4" stroke-width="0.3" stroke-dasharray="1,5"/>
  <line x1="40" y1="200" x2="360" y2="200" stroke="#D4D4D4" stroke-width="0.3" stroke-dasharray="1,5"/>
  <!-- Corner marks -->
  <g stroke="#D4D4D4" stroke-width="0.5" opacity="0.4">
    <line x1="20" y1="20" x2="35" y2="20"/><line x1="20" y1="20" x2="20" y2="35"/>
    <line x1="380" y1="20" x2="365" y2="20"/><line x1="380" y1="20" x2="380" y2="35"/>
    <line x1="20" y1="380" x2="35" y2="380"/><line x1="20" y1="380" x2="20" y2="365"/>
    <line x1="380" y1="380" x2="365" y2="380"/><line x1="380" y1="380" x2="380" y2="365"/>
  </g>
  <!-- Step 1 (bottom-left) -->
  <polygon points="80,310 120,290 160,310 120,330" fill="#7114E2" fill-opacity="0.15" stroke="#7114E2" stroke-width="1" opacity="0.75"/>
  <polygon points="80,310 120,330 120,350 80,330" fill="url(#a-xhatch)" stroke="#7114E2" stroke-width="0.8" opacity="0.65"/>
  <polygon points="80,310 120,330 120,350 80,330" fill="#7114E2" fill-opacity="0.25"/>
  <polygon points="160,310 120,330 120,350 160,330" fill="#7114E2" fill-opacity="0.12" stroke="#7114E2" stroke-width="0.8" opacity="0.65"/>
  <!-- Step 2 -->
  <polygon points="130,260 170,240 210,260 170,280" fill="#7114E2" fill-opacity="0.2" stroke="#7114E2" stroke-width="1" opacity="0.8"/>
  <polygon points="130,260 170,280 170,300 130,280" fill="url(#a-dots)" stroke="#7114E2" stroke-width="0.8" opacity="0.7"/>
  <polygon points="130,260 170,280 170,300 130,280" fill="#7114E2" fill-opacity="0.3"/>
  <polygon points="210,260 170,280 170,300 210,280" fill="#7114E2" fill-opacity="0.15" stroke="#7114E2" stroke-width="0.8" opacity="0.7"/>
  <!-- Step 3 -->
  <polygon points="180,210 220,190 260,210 220,230" fill="#7114E2" fill-opacity="0.25" stroke="#7114E2" stroke-width="1" opacity="0.8"/>
  <polygon points="180,210 220,230 220,250 180,230" fill="url(#a-xhatch)" stroke="#7114E2" stroke-width="0.8" opacity="0.75"/>
  <polygon points="180,210 220,230 220,250 180,230" fill="#7114E2" fill-opacity="0.35"/>
  <polygon points="260,210 220,230 220,250 260,230" fill="url(#a-diag)" stroke="#7114E2" stroke-width="0.8" opacity="0.75"/>
  <!-- Step 4 -->
  <polygon points="230,160 270,140 310,160 270,180" fill="#7114E2" fill-opacity="0.3" stroke="#7114E2" stroke-width="1" opacity="0.85"/>
  <polygon points="230,160 270,180 270,200 230,180" fill="url(#a-dots)" stroke="#7114E2" stroke-width="0.8" opacity="0.8"/>
  <polygon points="230,160 270,180 270,200 230,180" fill="#7114E2" fill-opacity="0.4"/>
  <polygon points="310,160 270,180 270,200 310,180" fill="#7114E2" fill-opacity="0.2" stroke="#7114E2" stroke-width="0.8" opacity="0.8"/>
  <!-- Step 5 (top) -->
  <polygon points="280,110 320,90 360,110 320,130" fill="#7114E2" fill-opacity="0.35" stroke="#7114E2" stroke-width="1.2" opacity="0.9"/>
  <polygon points="280,110 320,130 320,150 280,130" fill="url(#a-xhatch)" stroke="#7114E2" stroke-width="1" opacity="0.8"/>
  <polygon points="280,110 320,130 320,150 280,130" fill="#7114E2" fill-opacity="0.45"/>
  <polygon points="360,110 320,130 320,150 360,130" fill="#7114E2" fill-opacity="0.25" stroke="#7114E2" stroke-width="1" opacity="0.8"/>
  <!-- Connecting risers -->
  <line x1="145" y1="295" x2="155" y2="275" stroke="#7114E2" stroke-width="1" opacity="0.55" stroke-dasharray="3,3"/>
  <line x1="195" y1="245" x2="205" y2="225" stroke="#7114E2" stroke-width="1" opacity="0.55" stroke-dasharray="3,3"/>
  <line x1="245" y1="195" x2="255" y2="175" stroke="#7114E2" stroke-width="1" opacity="0.55" stroke-dasharray="3,3"/>
  <line x1="295" y1="145" x2="305" y2="125" stroke="#7114E2" stroke-width="1" opacity="0.55" stroke-dasharray="3,3"/>
  <!-- Percentage labels -->
  <text x="60" y="338" font-family="monospace" font-size="7" fill="#7114E2" opacity="0.6">25%</text>
  <text x="110" y="288" font-family="monospace" font-size="7" fill="#7114E2" opacity="0.6">50%</text>
  <text x="160" y="238" font-family="monospace" font-size="7" fill="#7114E2" opacity="0.6">75%</text>
  <text x="210" y="188" font-family="monospace" font-size="7" fill="#7114E2" opacity="0.6">90%</text>
  <text x="260" y="138" font-family="monospace" font-size="7" fill="#7114E2" opacity="0.65">100%</text>
  <!-- Arrow at top -->
  <polygon points="340,72 344,80 336,80" fill="#7114E2" opacity="0.65"/>
  <line x1="340" y1="80" x2="340" y2="95" stroke="#7114E2" stroke-width="1" opacity="0.6"/>
  <!-- Dimension line -->
  <line x1="50" y1="350" x2="370" y2="80" stroke="#D4D4D4" stroke-width="0.3" opacity="0.25" stroke-dasharray="4,4"/>
</svg>
