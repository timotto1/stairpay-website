<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="le-glow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <marker id="le-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#7114E2" stroke-width="1.5"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#0A0515"/>
  <!-- Left panel: PDF Document -->
  <rect x="40" y="30" width="300" height="340" rx="8" fill="#130929" stroke="#E5DAFB" stroke-width="1" stroke-opacity="0.3"/>
  <text x="190" y="60" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" fill="#E5DAFB" fill-opacity="0.5" letter-spacing="1">SOURCE DOCUMENT</text>
  <!-- PDF icon -->
  <rect x="80" y="80" width="220" height="270" rx="4" fill="#0A0515" stroke="#E5DAFB" stroke-width="1" stroke-opacity="0.2"/>
  <!-- PDF header -->
  <rect x="100" y="95" width="60" height="8" rx="2" fill="#7114E2" fill-opacity="0.3"/>
  <rect x="100" y="110" width="180" height="4" rx="1" fill="#E5DAFB" fill-opacity="0.15"/>
  <rect x="100" y="120" width="160" height="4" rx="1" fill="#E5DAFB" fill-opacity="0.15"/>
  <rect x="100" y="130" width="180" height="4" rx="1" fill="#E5DAFB" fill-opacity="0.15"/>
  <!-- Highlighted section 1 -->
  <rect x="96" y="148" width="190" height="22" rx="2" fill="#7114E2" fill-opacity="0.1" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="100" y="152" width="120" height="4" rx="1" fill="#7114E2" fill-opacity="0.4"/>
  <rect x="100" y="162" width="80" height="4" rx="1" fill="#E5DAFB" fill-opacity="0.2"/>
  <rect x="100" y="180" width="170" height="4" rx="1" fill="#E5DAFB" fill-opacity="0.12"/>
  <rect x="100" y="190" width="140" height="4" rx="1" fill="#E5DAFB" fill-opacity="0.12"/>
  <!-- Highlighted section 2 -->
  <rect x="96" y="204" width="190" height="22" rx="2" fill="#7114E2" fill-opacity="0.1" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="100" y="208" width="100" height="4" rx="1" fill="#7114E2" fill-opacity="0.4"/>
  <rect x="100" y="218" width="140" height="4" rx="1" fill="#E5DAFB" fill-opacity="0.2"/>
  <rect x="100" y="236" width="180" height="4" rx="1" fill="#E5DAFB" fill-opacity="0.12"/>
  <rect x="100" y="246" width="150" height="4" rx="1" fill="#E5DAFB" fill-opacity="0.12"/>
  <!-- Highlighted section 3 -->
  <rect x="96" y="260" width="190" height="22" rx="2" fill="#7114E2" fill-opacity="0.1" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="100" y="264" width="130" height="4" rx="1" fill="#7114E2" fill-opacity="0.4"/>
  <rect x="100" y="274" width="90" height="4" rx="1" fill="#E5DAFB" fill-opacity="0.2"/>
  <rect x="100" y="292" width="160" height="4" rx="1" fill="#E5DAFB" fill-opacity="0.12"/>
  <rect x="100" y="302" width="180" height="4" rx="1" fill="#E5DAFB" fill-opacity="0.12"/>
  <rect x="100" y="312" width="120" height="4" rx="1" fill="#E5DAFB" fill-opacity="0.12"/>
  <rect x="100" y="322" width="170" height="4" rx="1" fill="#E5DAFB" fill-opacity="0.12"/>
  <!-- Center: Connection arrow with glow -->
  <ellipse cx="400" cy="200" rx="30" ry="30" fill="#7114E2" fill-opacity="0.1" filter="url(#le-glow)"/>
  <path d="M350,155 C380,155 380,155 395,175" fill="none" stroke="#7114E2" stroke-width="1" stroke-opacity="0.5" marker-end="url(#le-arrow)"/>
  <path d="M350,200 L395,200" fill="none" stroke="#7114E2" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#le-arrow)"/>
  <path d="M350,250 C380,250 380,250 395,225" fill="none" stroke="#7114E2" stroke-width="1" stroke-opacity="0.5" marker-end="url(#le-arrow)"/>
  <!-- AI processing indicator -->
  <circle cx="400" cy="200" r="16" fill="#130929" stroke="#7114E2" stroke-width="1.5"/>
  <text x="400" y="204" text-anchor="middle" font-family="Poppins, sans-serif" font-size="8" fill="#7114E2" font-weight="600">AI</text>
  <!-- Right panel: Structured data -->
  <rect x="460" y="30" width="300" height="340" rx="8" fill="#130929" stroke="#7114E2" stroke-width="1.5"/>
  <text x="610" y="60" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" fill="#7114E2" letter-spacing="1">EXTRACTED DATA</text>
  <!-- Data fields -->
  <rect x="480" y="80" width="260" height="40" rx="4" fill="#0A0515" stroke="#7114E2" stroke-width="1" stroke-opacity="0.4"/>
  <text x="495" y="97" font-family="Poppins, sans-serif" font-size="9" fill="#E5DAFB" fill-opacity="0.5">Lease Term</text>
  <text x="495" y="112" font-family="Poppins, sans-serif" font-size="12" fill="#E5DAFB" font-weight="500">125 years from 01/01/2024</text>
  <rect x="480" y="130" width="260" height="40" rx="4" fill="#0A0515" stroke="#7114E2" stroke-width="1" stroke-opacity="0.4"/>
  <text x="495" y="147" font-family="Poppins, sans-serif" font-size="9" fill="#E5DAFB" fill-opacity="0.5">Initial Share</text>
  <text x="495" y="162" font-family="Poppins, sans-serif" font-size="12" fill="#E5DAFB" font-weight="500">25% of £320,000</text>
  <rect x="480" y="180" width="260" height="40" rx="4" fill="#0A0515" stroke="#7114E2" stroke-width="1" stroke-opacity="0.4"/>
  <text x="495" y="197" font-family="Poppins, sans-serif" font-size="9" fill="#E5DAFB" fill-opacity="0.5">Annual Rent</text>
  <text x="495" y="212" font-family="Poppins, sans-serif" font-size="12" fill="#E5DAFB" font-weight="500">2.75% of unsold share</text>
  <rect x="480" y="230" width="260" height="40" rx="4" fill="#0A0515" stroke="#7114E2" stroke-width="1" stroke-opacity="0.4"/>
  <text x="495" y="247" font-family="Poppins, sans-serif" font-size="9" fill="#E5DAFB" fill-opacity="0.5">Rent Review</text>
  <text x="495" y="262" font-family="Poppins, sans-serif" font-size="12" fill="#E5DAFB" font-weight="500">RPI + 0.5% annually</text>
  <rect x="480" y="280" width="260" height="40" rx="4" fill="#0A0515" stroke="#7114E2" stroke-width="1" stroke-opacity="0.4"/>
  <text x="495" y="297" font-family="Poppins, sans-serif" font-size="9" fill="#E5DAFB" fill-opacity="0.5">Staircasing</text>
  <text x="495" y="312" font-family="Poppins, sans-serif" font-size="12" fill="#E5DAFB" font-weight="500">Min 10% increments permitted</text>
  <rect x="480" y="330" width="126" height="28" rx="4" fill="#7114E2" fill-opacity="0.15" stroke="#7114E2" stroke-width="1"/>
  <text x="543" y="348" text-anchor="middle" font-family="Poppins, sans-serif" font-size="9" fill="#7114E2">98% Confidence</text>
  <circle cx="520" cy="344" r="4" fill="#22c55e" fill-opacity="0.8"/>
</svg>
