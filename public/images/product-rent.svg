<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <pattern id="r-xhatch" width="8" height="8" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="8" y2="8" stroke="#7114E2" stroke-width="0.5" opacity="0.6"/>
      <line x1="8" y1="0" x2="0" y2="8" stroke="#7114E2" stroke-width="0.5" opacity="0.6"/>
    </pattern>
    <pattern id="r-dots" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="0.7" fill="#7114E2" opacity="0.5"/>
    </pattern>
    <pattern id="r-diag" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="6" x2="6" y2="0" stroke="#7114E2" stroke-width="0.4" opacity="0.5"/>
    </pattern>
  </defs>
  <!-- Construction lines -->
  <line x1="200" y1="20" x2="200" y2="380" stroke="#D4D4D4" stroke-width="0.4" stroke-dasharray="2,4"/>
  <line x1="40" y1="200" x2="360" y2="200" stroke="#D4D4D4" stroke-width="0.4" stroke-dasharray="2,4"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#D4D4D4" stroke-width="0.3" stroke-dasharray="3,5"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="#D4D4D4" stroke-width="0.3" stroke-dasharray="2,4"/>
  <!-- Corner marks -->
  <g stroke="#D4D4D4" stroke-width="0.5" opacity="0.4">
    <line x1="20" y1="20" x2="35" y2="20"/><line x1="20" y1="20" x2="20" y2="35"/>
    <line x1="380" y1="20" x2="365" y2="20"/><line x1="380" y1="20" x2="380" y2="35"/>
    <line x1="20" y1="380" x2="35" y2="380"/><line x1="20" y1="380" x2="20" y2="365"/>
    <line x1="380" y1="380" x2="365" y2="380"/><line x1="380" y1="380" x2="380" y2="365"/>
  </g>
  <!-- Node 1 (top) -->
  <polygon points="200,80 220,92 220,116 200,128 180,116 180,92" fill="#7114E2" fill-opacity="0.2" stroke="#7114E2" stroke-width="1" opacity="0.85"/>
  <polygon points="200,80 220,92 220,116 200,128 180,116 180,92" fill="url(#r-xhatch)"/>
  <!-- Node 2 (top-right) -->
  <polygon points="300,140 320,152 320,176 300,188 280,176 280,152" fill="#7114E2" fill-opacity="0.25" stroke="#7114E2" stroke-width="1" opacity="0.8"/>
  <polygon points="300,140 320,152 320,176 300,188 280,176 280,152" fill="url(#r-dots)"/>
  <!-- Node 3 (bottom-right) -->
  <polygon points="300,220 320,232 320,256 300,268 280,256 280,232" fill="#7114E2" fill-opacity="0.28" stroke="#7114E2" stroke-width="1" opacity="0.8"/>
  <polygon points="300,220 320,232 320,256 300,268 280,256 280,232" fill="url(#r-diag)"/>
  <!-- Node 4 (bottom) -->
  <polygon points="200,280 220,292 220,316 200,328 180,316 180,292" fill="#7114E2" fill-opacity="0.2" stroke="#7114E2" stroke-width="1" opacity="0.8"/>
  <polygon points="200,280 220,292 220,316 200,328 180,316 180,292" fill="url(#r-xhatch)"/>
  <!-- Node 5 (bottom-left) -->
  <polygon points="100,220 120,232 120,256 100,268 80,256 80,232" fill="#7114E2" fill-opacity="0.25" stroke="#7114E2" stroke-width="1" opacity="0.8"/>
  <polygon points="100,220 120,232 120,256 100,268 80,256 80,232" fill="url(#r-dots)"/>
  <!-- Node 6 (top-left) -->
  <polygon points="100,140 120,152 120,176 100,188 80,176 80,152" fill="#7114E2" fill-opacity="0.28" stroke="#7114E2" stroke-width="1" opacity="0.8"/>
  <polygon points="100,140 120,152 120,176 100,188 80,176 80,152" fill="url(#r-diag)"/>
  <!-- Connecting lines between nodes -->
  <line x1="218" y1="116" x2="282" y2="152" stroke="#7114E2" stroke-width="1" opacity="0.6"/>
  <line x1="318" y1="176" x2="318" y2="232" stroke="#7114E2" stroke-width="1" opacity="0.6"/>
  <line x1="282" y1="256" x2="218" y2="292" stroke="#7114E2" stroke-width="1" opacity="0.6"/>
  <line x1="182" y1="292" x2="118" y2="256" stroke="#7114E2" stroke-width="1" opacity="0.6"/>
  <line x1="82" y1="232" x2="82" y2="176" stroke="#7114E2" stroke-width="1" opacity="0.6"/>
  <line x1="118" y1="152" x2="182" y2="116" stroke="#7114E2" stroke-width="1" opacity="0.6"/>
  <!-- Flow arrows on connections -->
  <polygon points="248,133 253,137 248,141" fill="#7114E2" opacity="0.65"/>
  <polygon points="318,202 322,207 314,207" fill="#7114E2" opacity="0.65"/>
  <polygon points="252,275 247,271 252,267" fill="#7114E2" opacity="0.65"/>
  <polygon points="148,275 153,271 148,267" fill="#7114E2" opacity="0.65"/>
  <polygon points="82,202 78,207 86,207" fill="#7114E2" opacity="0.65"/>
  <polygon points="148,133 153,137 148,141" fill="#7114E2" opacity="0.65"/>
  <!-- Central hub -->
  <polygon points="200,175 225,190 225,210 200,225 175,210 175,190" fill="#7114E2" fill-opacity="0.35" stroke="#7114E2" stroke-width="1.2" opacity="0.85"/>
  <polygon points="200,175 225,190 225,210 200,225 175,210 175,190" fill="url(#r-xhatch)"/>
  <circle cx="200" cy="200" r="4" fill="#7114E2" opacity="0.7"/>
  <circle cx="200" cy="200" r="8" fill="none" stroke="#7114E2" stroke-width="0.6" opacity="0.55"/>
  <!-- Spokes from center to nodes -->
  <line x1="200" y1="175" x2="200" y2="128" stroke="#7114E2" stroke-width="0.6" opacity="0.5" stroke-dasharray="2,3"/>
  <line x1="225" y1="190" x2="280" y2="152" stroke="#7114E2" stroke-width="0.6" opacity="0.5" stroke-dasharray="2,3"/>
  <line x1="225" y1="210" x2="280" y2="232" stroke="#7114E2" stroke-width="0.6" opacity="0.5" stroke-dasharray="2,3"/>
  <line x1="200" y1="225" x2="200" y2="280" stroke="#7114E2" stroke-width="0.6" opacity="0.5" stroke-dasharray="2,3"/>
  <line x1="175" y1="210" x2="120" y2="232" stroke="#7114E2" stroke-width="0.6" opacity="0.5" stroke-dasharray="2,3"/>
  <line x1="175" y1="190" x2="120" y2="152" stroke="#7114E2" stroke-width="0.6" opacity="0.5" stroke-dasharray="2,3"/>
  <!-- Labels -->
  <text x="200" y="70" font-family="monospace" font-size="6" fill="#7114E2" opacity="0.55" text-anchor="middle">Q1</text>
  <text x="340" y="168" font-family="monospace" font-size="6" fill="#7114E2" opacity="0.55">Q2</text>
  <text x="340" y="248" font-family="monospace" font-size="6" fill="#7114E2" opacity="0.55">Q3</text>
  <text x="200" y="345" font-family="monospace" font-size="6" fill="#7114E2" opacity="0.55" text-anchor="middle">Q4</text>
  <text x="55" y="248" font-family="monospace" font-size="6" fill="#7114E2" opacity="0.55">Q5</text>
  <text x="55" y="168" font-family="monospace" font-size="6" fill="#7114E2" opacity="0.55">Q6</text>
</svg>
