<svg xmlns="http://www.w3.org/2000/svg" width="3" height="800" viewBox="0 0 3 800">
  <filter id="pencil">
    <feTurbulence type="fractalNoise" baseFrequency="0.1 0.8" numOctaves="4" seed="5" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <line x1="1.5" y1="0" x2="1.5" y2="800" stroke="#C8C8C8" stroke-width="0.8" filter="url(#pencil)" opacity="0.7"/>
  <line x1="1.5" y1="0" x2="1.5" y2="800" stroke="#B0B0B0" stroke-width="0.3" filter="url(#pencil)" opacity="0.4"/>
</svg>
