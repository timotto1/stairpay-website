<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="gs-glow">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <linearGradient id="gs-shield" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7114E2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#26045D" stop-opacity="0.1"/>
    </linearGradient>
    <clipPath id="gs-clip">
      <path d="M200,40 L320,90 L320,200 C320,280 260,340 200,360 C140,340 80,280 80,200 L80,90 Z"/>
    </clipPath>
  </defs>
  <rect width="400" height="400" fill="#0A0515"/>
  <!-- Outer glow -->
  <path d="M200,40 L320,90 L320,200 C320,280 260,340 200,360 C140,340 80,280 80,200 L80,90 Z" fill="#7114E2" fill-opacity="0.08" filter="url(#gs-glow)"/>
  <!-- Shield outline -->
  <path d="M200,40 L320,90 L320,200 C320,280 260,340 200,360 C140,340 80,280 80,200 L80,90 Z" fill="url(#gs-shield)" stroke="#7114E2" stroke-width="2"/>
  <!-- Inner shield -->
  <path d="M200,60 L300,102 L300,200 C300,268 248,320 200,338 C152,320 100,268 100,200 L100,102 Z" fill="none" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Data flow lines running through shield -->
  <!-- Horizontal lines -->
  <line x1="30" y1="140" x2="120" y2="140" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="280" y1="140" x2="370" y2="140" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="120" y1="140" x2="280" y2="140" stroke="#7114E2" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="6,4"/>
  <line x1="30" y1="180" x2="110" y2="180" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="290" y1="180" x2="370" y2="180" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="110" y1="180" x2="290" y2="180" stroke="#7114E2" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="6,4"/>
  <line x1="30" y1="220" x2="115" y2="220" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="285" y1="220" x2="370" y2="220" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="115" y1="220" x2="285" y2="220" stroke="#7114E2" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="6,4"/>
  <line x1="30" y1="260" x2="125" y2="260" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="275" y1="260" x2="370" y2="260" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="125" y1="260" x2="275" y2="260" stroke="#7114E2" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="6,4"/>
  <!-- Data nodes on lines (left) -->
  <circle cx="50" cy="140" r="3" fill="#7114E2" fill-opacity="0.6"/>
  <circle cx="45" cy="180" r="3" fill="#7114E2" fill-opacity="0.6"/>
  <circle cx="55" cy="220" r="3" fill="#7114E2" fill-opacity="0.6"/>
  <circle cx="42" cy="260" r="3" fill="#7114E2" fill-opacity="0.6"/>
  <!-- Data nodes on lines (right) -->
  <circle cx="350" cy="140" r="3" fill="#7114E2" fill-opacity="0.6"/>
  <circle cx="355" cy="180" r="3" fill="#7114E2" fill-opacity="0.6"/>
  <circle cx="345" cy="220" r="3" fill="#7114E2" fill-opacity="0.6"/>
  <circle cx="358" cy="260" r="3" fill="#7114E2" fill-opacity="0.6"/>
  <!-- Shield entry/exit nodes -->
  <circle cx="120" cy="140" r="4" fill="#130929" stroke="#7114E2" stroke-width="1.5"/>
  <circle cx="280" cy="140" r="4" fill="#130929" stroke="#7114E2" stroke-width="1.5"/>
  <circle cx="110" cy="180" r="4" fill="#130929" stroke="#7114E2" stroke-width="1.5"/>
  <circle cx="290" cy="180" r="4" fill="#130929" stroke="#7114E2" stroke-width="1.5"/>
  <circle cx="115" cy="220" r="4" fill="#130929" stroke="#7114E2" stroke-width="1.5"/>
  <circle cx="285" cy="220" r="4" fill="#130929" stroke="#7114E2" stroke-width="1.5"/>
  <circle cx="125" cy="260" r="4" fill="#130929" stroke="#7114E2" stroke-width="1.5"/>
  <circle cx="275" cy="260" r="4" fill="#130929" stroke="#7114E2" stroke-width="1.5"/>
  <!-- Central lock/check icon -->
  <rect x="182" y="175" width="36" height="30" rx="4" fill="#130929" stroke="#7114E2" stroke-width="1.5"/>
  <path d="M192,175 L192,165 C192,158 196,152 200,152 C204,152 208,158 208,165 L208,175" fill="none" stroke="#7114E2" stroke-width="1.5"/>
  <circle cx="200" cy="190" r="3" fill="#7114E2"/>
  <!-- Labels -->
  <text x="200" y="310" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" fill="#E5DAFB" font-weight="600" letter-spacing="1">AI GOVERNANCE</text>
  <text x="200" y="328" text-anchor="middle" font-family="Poppins, sans-serif" font-size="9" fill="#E5DAFB" fill-opacity="0.5">Secure &amp; Auditable</text>
  <!-- Corner labels -->
  <text x="20" y="125" font-family="Poppins, sans-serif" font-size="7" fill="#E5DAFB" fill-opacity="0.3">Input</text>
  <text x="355" y="125" font-family="Poppins, sans-serif" font-size="7" fill="#E5DAFB" fill-opacity="0.3">Output</text>
  <!-- Bottom attributes -->
  <rect x="70" y="365" width="80" height="22" rx="4" fill="#130929" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3"/>
  <text x="110" y="380" text-anchor="middle" font-family="Poppins, sans-serif" font-size="8" fill="#7114E2">Encrypted</text>
  <rect x="162" y="365" width="76" height="22" rx="4" fill="#130929" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3"/>
  <text x="200" y="380" text-anchor="middle" font-family="Poppins, sans-serif" font-size="8" fill="#7114E2">Auditable</text>
  <rect x="250" y="365" width="80" height="22" rx="4" fill="#130929" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3"/>
  <text x="290" y="380" text-anchor="middle" font-family="Poppins, sans-serif" font-size="8" fill="#7114E2">Compliant</text>
</svg>
