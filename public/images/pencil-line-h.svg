<svg xmlns="http://www.w3.org/2000/svg" width="800" height="3" viewBox="0 0 800 3">
  <filter id="pencil">
    <feTurbulence type="fractalNoise" baseFrequency="0.8 0.1" numOctaves="4" seed="2" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <line x1="0" y1="1.5" x2="800" y2="1.5" stroke="#C8C8C8" stroke-width="0.8" filter="url(#pencil)" opacity="0.7"/>
  <line x1="0" y1="1.5" x2="800" y2="1.5" stroke="#B0B0B0" stroke-width="0.3" filter="url(#pencil)" opacity="0.4"/>
</svg>
