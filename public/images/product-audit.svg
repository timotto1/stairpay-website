<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <pattern id="au-xhatch" width="8" height="8" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="8" y2="8" stroke="#7114E2" stroke-width="0.5" opacity="0.6"/>
      <line x1="8" y1="0" x2="0" y2="8" stroke="#7114E2" stroke-width="0.5" opacity="0.6"/>
    </pattern>
    <pattern id="au-dots" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="0.8" fill="#7114E2" opacity="0.5"/>
    </pattern>
    <pattern id="au-hlines" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="3" x2="6" y2="3" stroke="#7114E2" stroke-width="0.4" opacity="0.4"/>
    </pattern>
  </defs>
  <!-- Construction lines -->
  <line x1="200" y1="20" x2="200" y2="380" stroke="#D4D4D4" stroke-width="0.4" stroke-dasharray="2,4"/>
  <line x1="40" y1="200" x2="360" y2="200" stroke="#D4D4D4" stroke-width="0.4" stroke-dasharray="2,4"/>
  <line x1="200" y1="30" x2="370" y2="200" stroke="#D4D4D4" stroke-width="0.3" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="370" y1="200" x2="200" y2="370" stroke="#D4D4D4" stroke-width="0.3" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="200" y1="370" x2="30" y2="200" stroke="#D4D4D4" stroke-width="0.3" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="30" y1="200" x2="200" y2="30" stroke="#D4D4D4" stroke-width="0.3" stroke-dasharray="4,4" opacity="0.4"/>
  <!-- Corner marks -->
  <g stroke="#D4D4D4" stroke-width="0.5" opacity="0.4">
    <line x1="20" y1="20" x2="35" y2="20"/><line x1="20" y1="20" x2="20" y2="35"/>
    <line x1="380" y1="20" x2="365" y2="20"/><line x1="380" y1="20" x2="380" y2="35"/>
    <line x1="20" y1="380" x2="35" y2="380"/><line x1="20" y1="380" x2="20" y2="365"/>
    <line x1="380" y1="380" x2="365" y2="380"/><line x1="380" y1="380" x2="380" y2="365"/>
  </g>
  <!-- Shield left face -->
  <polygon points="200,60 90,175 90,270 200,340" fill="#7114E2" fill-opacity="0.15" stroke="#7114E2" stroke-width="1" opacity="0.8"/>
  <polygon points="200,60 90,175 90,270 200,340" fill="url(#au-xhatch)"/>
  <!-- Shield right face -->
  <polygon points="200,60 310,175 310,270 200,340" fill="#7114E2" fill-opacity="0.1" stroke="#7114E2" stroke-width="1" opacity="0.8"/>
  <polygon points="200,60 310,175 310,270 200,340" fill="url(#au-dots)"/>
  <!-- Shield bottom keel -->
  <polygon points="90,270 200,340 310,270 200,310" fill="#7114E2" fill-opacity="0.2" stroke="#7114E2" stroke-width="0.8" opacity="0.7"/>
  <polygon points="90,270 200,340 310,270 200,310" fill="url(#au-hlines)"/>
  <!-- Inner panel left -->
  <polygon points="200,100 120,180 120,250 200,300" fill="#7114E2" fill-opacity="0.12" stroke="#7114E2" stroke-width="0.8" opacity="0.7"/>
  <polygon points="200,100 120,180 120,250 200,300" fill="url(#au-dots)"/>
  <!-- Inner panel right -->
  <polygon points="200,100 280,180 280,250 200,300" fill="#7114E2" fill-opacity="0.18" stroke="#7114E2" stroke-width="0.8" opacity="0.7"/>
  <polygon points="200,100 280,180 280,250 200,300" fill="url(#au-xhatch)" opacity="0.7"/>
  <!-- Checkmark -->
  <polyline points="170,205 190,225 235,175" stroke="#7114E2" stroke-width="3" fill="none" opacity="0.8" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="170,205 190,225 235,175" stroke="#7114E2" stroke-width="6" fill="none" opacity="0.15" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Scan lines radiating from top -->
  <g stroke="#7114E2" stroke-width="0.5" opacity="0.4">
    <line x1="200" y1="60" x2="50" y2="120"/>
    <line x1="200" y1="60" x2="60" y2="100"/>
    <line x1="200" y1="60" x2="350" y2="120"/>
    <line x1="200" y1="60" x2="340" y2="100"/>
  </g>
  <!-- Horizontal scan lines -->
  <g stroke="#7114E2" stroke-width="0.4" opacity="0.2" stroke-dasharray="3,6">
    <line x1="80" y1="160" x2="320" y2="160"/>
    <line x1="80" y1="190" x2="320" y2="190"/>
    <line x1="80" y1="220" x2="320" y2="220"/>
    <line x1="80" y1="250" x2="320" y2="250"/>
  </g>
  <!-- Inspection points at vertices -->
  <g fill="none" stroke="#7114E2" stroke-width="1.2">
    <circle cx="200" cy="60" r="4" opacity="0.75"/>
    <circle cx="90" cy="175" r="4" opacity="0.75"/>
    <circle cx="310" cy="175" r="4" opacity="0.75"/>
    <circle cx="90" cy="270" r="4" opacity="0.75"/>
    <circle cx="310" cy="270" r="4" opacity="0.75"/>
    <circle cx="200" cy="340" r="4" opacity="0.75"/>
  </g>
  <g fill="#7114E2">
    <circle cx="200" cy="60" r="1.5" opacity="0.8"/>
    <circle cx="90" cy="175" r="1.5" opacity="0.8"/>
    <circle cx="310" cy="175" r="1.5" opacity="0.8"/>
    <circle cx="90" cy="270" r="1.5" opacity="0.8"/>
    <circle cx="310" cy="270" r="1.5" opacity="0.8"/>
    <circle cx="200" cy="340" r="1.5" opacity="0.8"/>
  </g>
  <!-- Protective arcs -->
  <g fill="none" stroke="#7114E2" stroke-width="0.6" opacity="0.35">
    <path d="M 130,80 A 120,120 0 0,1 270,80"/>
    <path d="M 115,90 A 140,140 0 0,1 285,90"/>
  </g>
  <!-- Edge tick marks -->
  <g stroke="#7114E2" stroke-width="0.5" opacity="0.4">
    <line x1="87" y1="200" x2="93" y2="200"/>
    <line x1="87" y1="220" x2="93" y2="220"/>
    <line x1="87" y1="240" x2="93" y2="240"/>
    <line x1="307" y1="200" x2="313" y2="200"/>
    <line x1="307" y1="220" x2="313" y2="220"/>
    <line x1="307" y1="240" x2="313" y2="240"/>
  </g>
  <!-- Dimension annotations -->
  <line x1="70" y1="175" x2="70" y2="270" stroke="#D4D4D4" stroke-width="0.4" opacity="0.4"/>
  <line x1="66" y1="175" x2="74" y2="175" stroke="#D4D4D4" stroke-width="0.4" opacity="0.4"/>
  <line x1="66" y1="270" x2="74" y2="270" stroke="#D4D4D4" stroke-width="0.4" opacity="0.4"/>
  <!-- Magnifying glass bottom-right -->
  <circle cx="335" cy="325" r="16" fill="none" stroke="#7114E2" stroke-width="1" opacity="0.4"/>
  <line x1="346" y1="336" x2="358" y2="348" stroke="#7114E2" stroke-width="1" opacity="0.4"/>
  <line x1="327" y1="325" x2="343" y2="325" stroke="#7114E2" stroke-width="0.5" opacity="0.35"/>
  <line x1="335" y1="317" x2="335" y2="333" stroke="#7114E2" stroke-width="0.5" opacity="0.35"/>
</svg>
