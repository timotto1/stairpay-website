  <text x="435" y="239" text-anchor="middle" font-family="Poppins, sans-serif" font-size="10" fill="#E5DAFB" fill-opacity="0.7">Event Processor</text>
  <rect x="520" y="215" width="130" height="40" rx="4" fill="#0A0515" stroke="#7114E2" stroke-width="1" stroke-opacity="0.4"/>
  <text x="585" y="239" text-anchor="middle" font-family="Poppins, sans-serif" font-size="10" fill="#E5DAFB" fill-opacity="0.7">API Gateway</text>
  <rect x="670" y="215" width="70" height="40" rx="4" fill="#0A0515" stroke="#7114E2" stroke-width="1" stroke-opacity="0.4"/>
  <text x="705" y="239" text-anchor="middle" font-family="Poppins, sans-serif" font-size="10" fill="#E5DAFB" fill-opacity="0.7">Auth</text>
  <!-- Vertical connection lines to bottom -->
  <line x1="200" y1="270" x2="200" y2="320" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="400" y1="270" x2="400" y2="320" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="600" y1="270" x2="600" y2="320" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4,4"/>
