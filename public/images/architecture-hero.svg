  <text x="122" y="424" text-anchor="middle" font-family="Poppins, sans-serif" font-size="9" fill="#E5DAFB" fill-opacity="0.5">Processing</text>
  <rect x="200" y="365" width="125" height="76" rx="4" fill="#130929" stroke="#7114E2" stroke-width="1" stroke-opacity="0.6"/>
  <text x="262" y="394" text-anchor="middle" font-family="Poppins, sans-serif" font-size="10" fill="#7114E2">Sales Pipeline</text>
  <text x="262" y="410" text-anchor="middle" font-family="Poppins, sans-serif" font-size="9" fill="#E5DAFB" fill-opacity="0.5">Forecast &amp;</text>
  <text x="262" y="424" text-anchor="middle" font-family="Poppins, sans-serif" font-size="9" fill="#E5DAFB" fill-opacity="0.5">Conversion</text>
  <rect x="340" y="365" width="125" height="76" rx="4" fill="#130929" stroke="#7114E2" stroke-width="1" stroke-opacity="0.6"/>
  <text x="402" y="394" text-anchor="middle" font-family="Poppins, sans-serif" font-size="10" fill="#7114E2">Staircasing</text>
  <text x="402" y="410" text-anchor="middle" font-family="Poppins, sans-serif" font-size="9" fill="#E5DAFB" fill-opacity="0.5">Propensity</text>
  <text x="402" y="424" text-anchor="middle" font-family="Poppins, sans-serif" font-size="9" fill="#E5DAFB" fill-opacity="0.5">Modelling</text>
  <rect x="480" y="365" width="125" height="76" rx="4" fill="#130929" stroke="#7114E2" stroke-width="1" stroke-opacity="0.6"/>
  <text x="542" y="394" text-anchor="middle" font-family="Poppins, sans-serif" font-size="10" fill="#7114E2">Rent &amp; SC</text>
  <text x="542" y="410" text-anchor="middle" font-family="Poppins, sans-serif" font-size="9" fill="#E5DAFB" fill-opacity="0.5">Calculation</text>
  <text x="542" y="424" text-anchor="middle" font-family="Poppins, sans-serif" font-size="9" fill="#E5DAFB" fill-opacity="0.5">Engine</text>
  <rect x="620" y="365" width="125" height="76" rx="4" fill="#130929" stroke="#7114E2" stroke-width="1" stroke-opacity="0.6"/>
  <text x="682" y="394" text-anchor="middle" font-family="Poppins, sans-serif" font-size="10" fill="#7114E2">Portfolio</text>
  <text x="682" y="410" text-anchor="middle" font-family="Poppins, sans-serif" font-size="9" fill="#E5DAFB" fill-opacity="0.5">Analytics &amp;</text>
  <text x="682" y="424" text-anchor="middle" font-family="Poppins, sans-serif" font-size="9" fill="#E5DAFB" fill-opacity="0.5">Reporting</text>
</svg>
