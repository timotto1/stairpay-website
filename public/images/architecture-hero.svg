  <line x1="400" y1="120" x2="400" y2="170" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="600" y1="120" x2="600" y2="170" stroke="#7114E2" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4,4"/>
