<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="ah-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7114E2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#26045D" stop-opacity="0"/>
    </linearGradient>
    <filter id="ah-blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#0A0515"/>
  <!-- Subtle glow backdrop -->
  <ellipse cx="400" cy="250" rx="300" ry="150" fill="url(#ah-glow)" filter="url(#ah-blur)"/>
  <!-- Top band: Lifecycle stages -->
  <rect x="40" y="40" width="720" height="80" rx="6" fill="none" stroke="#7114E2" stroke-width="1" stroke-opacity="0.5"/>
  <text x="400" y="58" text-anchor="middle" font-family="Poppins, sans-serif" font-size="10" fill="#E5DAFB" fill-opacity="0.6" letter-spacing="2">SHARED OWNERSHIP LIFECYCLE</text>
  <!-- Stage boxes -->
  <rect x="60" y="72" width="100" height="36" rx="4" fill="#130929" stroke="#7114E2" stroke-width="1"/>
  <text x="110" y="94" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" fill="#E5DAFB">Sales</text>
  <rect x="172" y="72" width="100" height="36" rx="4" fill="#130929" stroke="#7114E2" stroke-width="1"/>
  <text x="222" y="94" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" fill="#E5DAFB">Move-in</text>
  <rect x="284" y="72" width="110" height="36" rx="4" fill="#130929" stroke="#7114E2" stroke-width="1"/>
  <text x="339" y="94" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" fill="#E5DAFB">Homeownership</text>
  <rect x="406" y="72" width="100" height="36" rx="4" fill="#130929" stroke="#7114E2" stroke-width="1"/>
  <text x="456" y="94" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" fill="#E5DAFB">Staircasing</text>
  <rect x="518" y="72" width="110" height="36" rx="4" fill="#130929" stroke="#7114E2" stroke-width="1"/>
  <text x="573" y="94" text-anchor="middle" font-family="Poppins, sans-serif" font-size="10" fill="#E5DAFB">Rent &amp; SC</text>
  <rect x="640" y="72" width="100" height="36" rx="4" fill="#130929" stroke="#7114E2" stroke-width="1"/>
  <text x="690" y="94" text-anchor="middle" font-family="Poppins, sans-serif" font-size="11" fill="#E5DAFB">Resale</text>
  <!-- Connecting lines between stages -->
  <line x1="160" y1="90" x2="172" y2="90" stroke="#7114E2" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="272" y1="90" x2="284" y2="90" stroke="#7114E2" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="394" y1="90" x2="406" y2="90" stroke="#7114E2" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="506" y1="90" x2="518" y2="90" stroke="#7114E2" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="628" y1="90" x2="640" y2="90" stroke="#7114E2" stroke-width="1" stroke-opacity="0.6"/>
  <!-- Vertical connection lines -->
